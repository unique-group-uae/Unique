<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعة UNIQUE | بوابتك نحو التوازن والنجاح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .hidden-panel { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- القسم الرئيسي -->
    <div class="container mx-auto p-6 text-center">
        <h1 class="text-4xl font-bold text-gray-800">مجموعة UNIQUE</h1>
        <p class="text-gray-600 mt-4">بوابتك نحو التوازن النفسي والنجاح المهني.</p>
        
        <!-- نموذج تسجيل البيانات -->
        <div class="mt-8 bg-white p-6 rounded-lg shadow-md max-w-md mx-auto">
            <h2 class="text-xl font-bold mb-4">انضم إلينا</h2>
            <input type="text" id="name" placeholder="الاسم" class="w-full p-2 border mb-2 rounded">
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-2 border mb-4 rounded">
            <button id="submitBtn" class="bg-blue-600 text-white w-full py-2 rounded hover:bg-blue-700">إرسال الطلب</button>
        </div>
    </div>

    <!-- لوحة الإدارة (سرية) -->
    <div class="container mx-auto mt-10 p-4">
        <input type="password" id="adminPass" placeholder="كلمة مرور الإدارة" class="p-2 border rounded">
        <button onclick="checkAdmin()" class="bg-gray-800 text-white px-4 py-2 rounded">دخول اللوحة</button>
        <div id="adminPanel" class="hidden-panel mt-6 bg-gray-200 p-4 rounded">
            <h3 class="font-bold">لوحة التحكم</h3>
            <div id="dataList" class="mt-2"></div>
        </div>
    </div>

    <!-- كود الربط السحابي -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";

        // إعدادات الربط المستخرجة من صورتك
        const firebaseConfig = {
            apiKey: "AIzaSyDzJFY54c0BdKmHWA5vUBxTA-wmTNnegNA",
            authDomain: "unique-group-f8b37.firebaseapp.com",
            databaseURL: "https://unique-group-f8b37-default-rtdb.firebaseio.com",
            projectId: "unique-group-f8b37",
            storageBucket: "unique-group-f8b37.firebasestorage.app",
            messagingSenderId: "194613996624",
            appId: "1:194613996624:web:81287dbda46db7f44b7555",
            measurementId: "G-HH3JMVZ19J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        // وظيفة الإرسال
        document.getElementById('submitBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            try {
                await addDoc(collection(db, "applicants"), { name, email, date: new Date() });
                alert("تم الإرسال بنجاح!");
            } catch (e) {
                alert("حدث خطأ في الإرسال.");
            }
        };

        // وظيفة الإدارة
        window.checkAdmin = async () => {
            const pass = document.getElementById('adminPass').value;
            if(pass === "unique2026") {
                document.getElementById('adminPanel').classList.remove('hidden-panel');
                const querySnapshot = await getDocs(collection(db, "applicants"));
                let html = "<ul>";
                querySnapshot.forEach((doc) => {
                    html += `<li>${doc.data().name} - ${doc.data().email}</li>`;
                });
                html += "</ul>";
                document.getElementById('dataList').innerHTML = html;
            } else {
                alert("كلمة المرور خاطئة!");
            }
        };
    </script>
</body>
</html>
